# Render Blueprint — https://render.com/docs/blueprint-spec
# Create a PostgreSQL database in the Render dashboard first, then set env vars below.

version: "1"
services:
  - type: web
    name: currentloop-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: "8080"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
