# Local defaults; override with env on Render/Railway/Vercel worker.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/currentloop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

# HS256: use a long random string in production (set JWT_SECRET).
jwt.secret=${JWT_SECRET:currentloop-development-jwt-secret-min-32chars}

# Comma-separated origins (local + deployed frontend).
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}
